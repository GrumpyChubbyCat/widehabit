name: widehabit-prod

version: "3.8"

services:
  postgres:
    image: postgres:18.1-alpine3.23
    env_file: .env.production
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wide

  widehabit-migrations:
    build:
      context: .
      dockerfile: docker/Dockerfile.migrations
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env.production
    networks:
      - wide

  widehabit-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
    depends_on:
      widehabit-migrations:
        condition: service_completed_successfully
    env_file: .env.production
    environment:
      WIDE_LISTEN_ADDRESS: 0.0.0.0
    expose:
      - "9091"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9091/api/v1/health/healthcheck >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wide

  widehabit-frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    depends_on:
      widehabit-service:
        condition: service_healthy
    ports:
      - "1966:1966"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:1966/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wide

volumes:
  pgdata_prod:
    driver: local
    name: widehabit-prod-pgdata

networks:
  wide:
    driver: bridge
    name: widehabit-prod
